# ##################################################################################### #
#          EDITE ESTE ARQUIVO SEGUINDO AS INSTRUÇÕES DA WIKI DO HYPRLAND!               #
# ##################################################################################### #

autogenerated = 0

# ############## #
#   MONITORESS   #
# ############## #

# ########################################################## #
# Coloque e configure seus monitores da seguinte maneira:    #
# monitor = [nome-do-monitor], [resolução]@[FPS], [scalling] #
# ex:                                                        #
# monitor = monitor1, 1920x1080@144, 1                       #
# ########################################################## #
monitor = , 1920x1080@60, 0x0, 1


# #################### #
#   PROGRAMAS PADRÃO   #
# #################### #

# ############################################## #
# Configure seus programas seguindo esse padrão: #
# $tipo-de-programa = nome-do-programa           #
# ex:                                            #
# $editor = vim                                  #
# ############################################## #

$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun
$browser = zen-browser
$live =  obs
$editor = kitty nvim
$music = spotify

# ####################### #
#     CURSOR DO MOUSE     #
# ####################### #

# ################################################### #
# Configure seu cursor de mouse seguindo esse padrão: #
# $cursor = nome-do-tema-do-cursor                    #
# $cursor_size = tamanho-do-cursor                    #
# ex:                                                 #
# $cursor = breeze_cursors                            #
# $cursor_size = 24px                                 #
# ################################################### #

$cursor = breeze_cursors
$cursor_size = 24px

# ############# #
#   AUTOSTART   #
# ############# #

# ################################################################################## #
# Execute coisas importantes como daemons ou apps ao iniciar o Hyprland              #
# ex:                                                                                #
# exec-once = kitty                                                                  #
# exec-once = waybar & hyprpaper & dunst & hypridle &                                #
# obs: Para processos em segundo plano, colocar um "&" no final, como mostrado acima #
# ################################################################################## #

exec-once = nm-applet &
exec-once = waybar & hyprpaper & dunst & hypridle & zsnow &
exec-once = hyprctl setcursor $cursor $cursor_size
exec-once = kitty
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &


# ######################### #
#   VARIÁVEIS DE AMBIENTE   #
# ######################### #

# ############################################################################################ #
# Consulte https://wiki.hypr.land/Configuring/Environment-variables/ para aprender mais sobre. #
# ############################################################################################ #

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRSHOT_DIR,~/Screenshots


# ################# #
#     APARÊNCIA     #
# ################# #

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2

    col.active_border = rgba(00ffffee) rgba(ffffffee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.8

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)
    
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


# ######### #
#   INPUT   #
# ######### #

# ############################################### #
# Configure aqui o layout do seu teclado e mouse! #
# ############################################### #

input {
    kb_layout = us
    kb_variant = intl
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0

    touchpad {

        # ################################################################################################### #
        # Natural Scroll significa que seu touchpad funcionará que nem tela de celular, com rolagem invertida #
        # ################################################################################################### #

        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace


# ########### #
#   ATALHOS   #
# ########### #
                 # #################################################################################### #
$mainMod = SUPER # Coloca a tecla SUPER como a padrão, ela é a tecla Windows ou Command no seu teclado! #
                 # #################################################################################### #

# ###################################################### #
# Para configurar atalhos, use o padrão a seguir:        #
# bind = [tecla-mod], [tecla-padrão], comando, comando 2 #
# ex:                                                    #
# bind = $mainMod, T, exec, $terminal                    #
# ###################################################### #

bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating
bind = $mainMod, space, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, exec, $editor
bind = $mainMod, D, exec, discord
bind = $mainMod, O, exec, $live
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, M, exec, spotify
bind = , XF86PowerOff, exec, /home/yasmin/scripts/powermenu.sh

# ################################################################## #
# Color Picker, requer pacote "hyprpicker" e dependências adicionais #
# ################################################################## #

bind = $mainMod shift, C, exec, hyprpicker -a

# #################################################################### #
# Capturas de tela, requer pacote "hyprshot" e dependências adicionais #
# #################################################################### #

bind = $mainMod, S, exec, hyprshot -m window -o ~/Imagens/Prints
bind = $mainMod shift, S, exec, hyprshot -m region -o ~/Imagens/Prints

# ######################## #
# Mover foco entre janelas #
# ######################## #

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ####################################################### #
# Mudar para Área de Trabalho Virtual com MainMod + [0-9] #
# ####################################################### #

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ########################################################################### #
# Mudar janela ativa para Área de Trabalho Virtual com MainMod + SHIF + [0-9] #
# ########################################################################### #

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ############################################################ #
# Mudar Área de Trabalho Virtual com MainMod + scroll do mouse #
# ############################################################ #

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ################################################# #
# Mover janelas/ajustar tamanho com botões do mouse #
# ################################################# #

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ################################################################### #
# Teclas de Notebook para ajustar volume, brilho da tela e do teclado #
# ################################################################### #

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindel = ,XF86KbdBrightnessUp, exec, brightnessctl -d '*kbd_backlight' set +100
bindel = ,XF86KbdBrightnessDown, exec, brightnessctl -d '*kbd_backlight' set 100-

# ################################ #
# Teclas de Notebook customizáveis #
# ################################ #

bindel = ,XF86LaunchA, exec, hyprshot -m region
bindel = ,XF86LaunchB, exec, $editor

# ############### #
# Teclas de Mídia #
# ############### #

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ####################### #
#  JANELAS E WORKSPACES   #
# ####################### #

windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# ################################ #
# Config para hypremoji caso tenha #
# ################################ #

source = ~/.config/hypr/hypremoji.conf
