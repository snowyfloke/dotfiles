$font = JetBrainsMono Nerd font

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = /home/yasmin/wallpaper/current/current.png
    blur_passes = 3
}

input-field {
    monitor =
    size = 30%, 10%
    outline_thickness = 3
    inner_color = rgba(0,0,0,0.0)

    outer_color = #00ffff
    check_color = rgba(00ff99ee) rgba(35, 255, 119, 1) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgba(255, 255, 255, 1)
    fade_on_empty = false
    rounding = 30

    font_family = $font
    placeholder_text = Insira a Senha...
    fail_text = Senha Inválida! ($ATTEMPTS tentativa(s) inválidas)

    dots_spacing = 0.3

    position = 0, -100
    halign = center
    valing = center
}

# Relógio
label {
    monitor =
    text = $TIME12
    font_size = 90
    font_family = $font

    position = 0, 100
    halign = center
    valign = center
}

# Data
label {
    monitor =
    text = cmd[update:60000] date +"%d de %B de %Y (%d/%m/%y)"
    font_size = 25
    font_family = $font

    position = 0, 20
    halign = center
    valign = center
}

