# ##################################################################################### #
#          EDITE ESTE ARQUIVO SEGUINDO AS INSTRUÇÕES DA WIKI DO HYPRLAND!               #
# ##################################################################################### #

autogenerated = 0
exec-once = qs -c noctalia-shell
exec-once = ~/scripts/fastfetch.sh

# ######################### #
#   VARIÁVEIS DE AMBIENTE   #
# ######################### #

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

exec-once=hyprctl setcursor $cursor $cursor_size

# ################# #
# Módulos de Config #
# ################# #

source = ~/.config/hypr/modules/programs.conf
source = ~/.config/hypremoji/hypremoji.conf
source = ~/.config/hypr/modules/windows.conf
source = ~/.config/hypr/modules/appearence.conf
source = ~/.config/hypr/modules/input.conf
source = ~/.config/hypr/modules/monitors.conf

# >>> HYPRLAND VISUAL EDITOR START <<<
# 1. Active Uninstall Watchdog
exec-once = /home/yasmin/.cache/noctalia/HVE/hve_watchdog.sh
# 2. Variable Definition (Color Palette)
source = /home/yasmin/.config/hypr/noctalia/noctalia-colors.conf
# 3. Effects Application (Visual Editor)
source = /home/yasmin/.cache/noctalia/HVE/overlay.conf
# >>> HYPRLAND VISUAL EDITOR END <<<
