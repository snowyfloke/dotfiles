# ######### #
#   INPUT   #
# ######### #

input {
    kb_layout = us
    kb_variant = intl
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}
gesture = 3, horizontal, workspace

# ########### #
#   ATALHOS   #
# ########### #

$mod= SUPER
$ipc = qs -c noctalia-shell ipc call

# 1. SISTEMA
bind = $mod, Q, killactive #"Fechar Janela Ativa"
bind = $mod, V, togglefloating #"Ativar modo flutuante das janelas"
bind = $mod, P, pseudo, #"dwindle"
bind = $mod, J, togglesplit, #"dwindle"
bind = $mod, left, movefocus, l #"Move o foco para a esquerda"
bind = $mod, right, movefocus, r #"Move o foco para a direita"
bind = $mod, up, movefocus, u #"Move o foco para cima"
bind = $mod, down, movefocus, d #"Move o foco para baixo"
bind = SUPER, SPACE, exec, $ipc launcher toggle #"Abre o lançador de apps"
bind = SUPER, comma, exec, $ipc settings toggle #"Abre as configurações"
bind = $mod, 1, workspace, 1 #"Troca Visualização a Área de trabalho 1"
bind = $mod, 2, workspace, 2 #"Troca Visualização a Área de trabalho 2"
bind = $mod, 3, workspace, 3 #"Troca Visualização a Área de trabalho 3"
bind = $mod, 4, workspace, 4 #"Troca Visualização a Área de trabalho 4"
bind = $mod, 5, workspace, 5 #"Troca Visualização a Área de trabalho 5"
bind = $mod, 6, workspace, 6 #"Troca Visualização a Área de trabalho 6"
bind = $mod, 7, workspace, 7 #"Troca Visualização a Área de trabalho 7"
bind = $mod, 8, workspace, 8 #"Troca Visualização a Área de trabalho 8"
bind = $mod, 9, workspace, 9 #"Troca Visualização a Área de trabalho 9"
bind = $mod, 0, workspace, 10 #"Troca Visualização a Área de trabalho 10"
bind = $mod SHIFT, 1, movetoworkspace, 1 #"Troca a janela focada para a Área de trabalho 1"
bind = $mod SHIFT, 2, movetoworkspace, 2 #"Troca a janela focada para a Área de trabalho 2"
bind = $mod SHIFT, 3, movetoworkspace, 3 #"Troca a janela focada para a Área de trabalho 3"
bind = $mod SHIFT, 4, movetoworkspace, 4 #"Troca a janela focada para a Área de trabalho 4"
bind = $mod SHIFT, 5, movetoworkspace, 5 #"Troca a janela focada para a Área de trabalho 5"
bind = $mod SHIFT, 6, movetoworkspace, 6 #"Troca a janela focada para a Área de trabalho 6"
bind = $mod SHIFT, 7, movetoworkspace, 7 #"Troca a janela focada para a Área de trabalho 7"
bind = $mod SHIFT, 8, movetoworkspace, 8 #"Troca a janela focada para a Área de trabalho 8"
bind = $mod SHIFT, 9, movetoworkspace, 9 #"Troca a janela focada para a Área de trabalho 9"
bind = $mod SHIFT, 0, movetoworkspace, 10 #"Troca a janela focada para a Área de trabalho 10"
bind = $mod, mouse_down, workspace, e+1 #"Move para a próxima Área de trabalho"
bind = $mod, mouse_up, workspace, e-1 #"Move para a Área de trabalho anterior"
bindm = SUPER, mouse:272, movewindow #"Move a janela ativa"
bindm = SUPER, mouse:273, resizewindow #"Redimensiona a janela ativa"

# 2. DISPOSITIVO
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ #"Aumenta o áudio em 5%"
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- #"Diminui o áudio em 5%"
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle #"Muta o áudio"
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle #"Muta o microfone"
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ #"Aumenta o brilho da tela em 5%"
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- #"Diminui o brilho da tela em 5%"
bindel = ,XF86KbdBrightnessUp, exec, brightnessctl -d '*kbd_backlight' set +100 #"Aumenta o brilho do teclado interno"
bindel = ,XF86KbdBrightnessDown, exec, brightnessctl -d '*kbd_backlight' set 100- #"diminui o brilho do teclaod interno"
bindl = ,XF86AudioNext, exec, playerctl next #"Próxima música"
bindl = ,XF86AudioPause, exec, playerctl play-pause #"Pausa a Música"
bindl = ,XF86AudioPlay, exec, playerctl play-pause #"Despausa a Música"
bindl = ,XF86AudioPrev, exec, playerctl previous #"Volta uma música"

# 3. SCRIPTS
bind = $mod shift, C, exec, hyprpicker -a #"Abrir seletor de cores"
bind = $mod, S, exec, hyprshot -m window -o ~/Imagens/Prints  #"Tirar print da janela inteira"
bind = $mod shift, S, exec, hyprshot -m region -o ~/Imagens/Prints  #"Tirar print de uma área da tela"
bind = SUPER, W, exec, qs -c noctalia-shell ipc call wallpaper toggle #"Troca o wallpaper e gera cores baseadas nele."

# 4. APPS
bind = $mod, E, exec, $fileManager #"Abre o explorador de arquivos"
bind = $mod SHIFT, E, exec, $tfileManager #"Abre o explorador de arquivos TUI"
bind = $mod, T, exec, $terminal #"Abrir terminal padrão"
bind = $mod, B, exec, $browser #"Abrir navegador padrão"
bind = $mod, D, exec, flatpak run dev.vencord.Vesktop #"Abrir Discord"
bind = $mod, O, exec, $live #"Abrir OBS"
bind = $mod, M, exec, spotify #"Abrir Spotify"

# 5. PLUGINS
bind = $mod SHIFT, W, overview:toggle #"Open MacOS-like Mission Control"
bind = $mod, G, hyprexpo:expo, toggle #"Open GNOME-like overview"
